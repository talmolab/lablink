<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LabLink Allocator</title>
</head>
<body>
    <h1>Request a VM</h1>
    <form action="/request_vm" method="post">
        <label for="participant_id">Participant ID:</label>
        <input type="text" id="participant_id" name="participant_id" required>
        <button type="submit">Request VM</button>
    </form>

    <h1>Remote Desktop Command</h1>
    <form action="/remote_command" method="post">
        <label for="command">Enter Remote Desktop Command:</label>
        <input type="text" id="command" name="command" required>
        <button type="submit">Submit</button>
    </form>
</body>
</html>
