name: CI for Lablink Services

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "packages/**"
      - ".github/workflows/ci.yml"

permissions:
  id-token: write
  contents: read

jobs:
  lint:
    name: Lint - ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - package: lablink-client
            python-version: "3.10"
            working-directory: packages/client
            ruff-command: "uv run ruff check src tests"
          - package: lablink-allocator
            python-version: "3.10"
            working-directory: packages/allocator
            ruff-command: "uv run ruff check src tests"
          - package: lablink-cli
            python-version: "3.11"
            working-directory: packages/cli
            ruff-command: "uv run ruff check src tests"
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up UV
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: ${{ matrix.working-directory }}
        run: uv sync --all-extras

      - name: Run ruff linter
        working-directory: ${{ matrix.working-directory }}
        run: ${{ matrix.ruff-command }}

  test:
    name: Test - ${{ matrix.package }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: lablink
          POSTGRES_PASSWORD: lablink
          POSTGRES_DB: lablink_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      matrix:
        include:
          - package: lablink-client
            python-version: "3.10"
            working-directory: packages/client
            test-command: "uv run pytest tests --cov=src/lablink_client_service --cov-report=term-missing:skip-covered --cov-report=xml --cov-report=html --cov-fail-under=90"
            needs-terraform: false
          - package: lablink-allocator
            python-version: "3.10"
            working-directory: packages/allocator
            test-command: "uv run pytest tests --maxfail=1 --disable-warnings --cov=. --cov-report=xml --cov-report=term --cov-fail-under=90"
            needs-terraform: true

          - package: lablink-cli
            python-version: "3.11"
            working-directory: packages/cli
            test-command: "uv run pytest tests --cov=src/lablink_cli --cov-report=term-missing:skip-covered --cov-report=xml --cov-report=html"
            needs-terraform: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up UV
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Configure AWS credentials for Terraform tests
        if: matrix.needs-terraform
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || 'us-west-2' }}

      - name: Setup Terraform
        if: matrix.needs-terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.6.6
          terraform_wrapper: false

      - name: Install dependencies
        working-directory: ${{ matrix.working-directory }}
        run: |
          uv sync --all-extras

      - name: Remove backend config for Terraform tests
        if: matrix.needs-terraform
        working-directory: packages/allocator/src/lablink_allocator_service/terraform
        run: rm -f backend.tf

      - name: Run tests
        working-directory: ${{ matrix.working-directory }}
        run: ${{ matrix.test-command }}
