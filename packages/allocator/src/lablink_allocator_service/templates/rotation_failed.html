<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LabLink — Couldn't prepare your seat</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center min-vh-100">
      <div class="card shadow p-4" style="width: 100%; max-width: 500px;">
        <h2 class="text-center mb-3">Couldn't prepare your seat</h2>

        <div class="alert alert-danger text-center" role="alert">
          The desktop session couldn't be set up on the assigned VM.
        </div>

        <p class="text-center mb-4">
          This is usually temporary — the VM may still be coming up.
          Reload and submit your email again. If the problem keeps
          happening, ask your instructor to check the dashboard.
        </p>

        <div class="d-grid">
          <a href="/" class="btn btn-primary">Try again</a>
        </div>
      </div>
    </div>

  </body>
</html>
