<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>LabLink — Desktop</title>
  <link rel="stylesheet" href="/static/novnc/app/styles/base.css">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    #screen { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="screen"></div>
  <script type="module">
    import RFB from "/static/novnc/core/rfb.js";

    // Build the WS URL on the client so the scheme always matches the
    // page's scheme. Deriving server-side from X-Forwarded-Proto is
    // fragile: any front door (ALB, Caddy, CloudFlare) that doesn't
    // set the header lands us with ws:// inside an https:// page,
    // which modern browsers silently block as mixed content.
    const wsScheme = location.protocol === "https:" ? "wss:" : "ws:";
    const wsUrl = `${wsScheme}//${location.host}/proxy/{{ browser_token }}`;

    const rfb = new RFB(
      document.getElementById("screen"),
      wsUrl,
      { credentials: {} }
    );
    rfb.viewOnly = false;
    rfb.scaleViewport = true;
    rfb.resizeSession = true;
  </script>
</body>
</html>
