<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LabLink — No seats available</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center min-vh-100">
      <div class="card shadow p-4" style="width: 100%; max-width: 500px;">
        <h2 class="text-center mb-3">No seats available</h2>

        <div class="alert alert-warning text-center" role="alert">
          All desktops are currently in use or still booting.
        </div>

        <p class="text-center mb-4">
          The instructor hasn't onboarded any clients yet, or every
          available VM has been claimed. Please wait a moment and try
          again — if this persists, ask your instructor to check the
          dashboard.
        </p>

        <div class="d-grid">
          <a href="/" class="btn btn-primary">Try again</a>
        </div>
      </div>
    </div>

  </body>
</html>
