# nginx config baked into the allocator container.
# Listens on :5000 (the container's public port; nginx is the listener now
# instead of Flask). Routes:
#   /                     → Flask control plane (form, dashboards, etc.)
#   /api/*, /admin/, etc. → Flask
#   /desktop              → Flask (renders the noVNC viewer)
#   /static/novnc/*       → static files served by nginx directly,
#                           aliased to /usr/share/novnc/ (apt-installed)
#   /proxy/<token>        → WebSocket; auth_request to Flask first,
#                           then proxy to the upstream KasmVNC
#   /internal/proxy_auth  → internal; only reachable from auth_request

upstream flask {
    server 127.0.0.1:8000;
}

server {
    listen 5000;
    server_name _;

    # Control plane: everything not otherwise matched goes to Flask.
    # proxy_*_timeout bumped from nginx's 60s default because /destroy
    # and /api/launch run terraform synchronously and routinely exceed
    # 60s; the ALB above us has a much higher ceiling.
    location / {
        proxy_pass http://flask;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # noVNC bundle — KasmVNC's, NOT Debian's generic novnc package.
    # Debian's novnc sends RFB extension types (msg 97) that KasmVNC
    # rejects on the first mouse/keyboard event; the Kasm-bundled
    # viewer is the only one protocol-compatible with kasmvncserver.
    location /static/novnc/ {
        alias /usr/share/kasmvnc/www/;
        access_log off;
    }

    # WebSocket proxy to the assigned client's KasmVNC, gated by auth_request.
    # nginx pauses the upgrade and asks Flask whether the request is authorized
    # AND which upstream to forward to (X-Upstream) AND which HTTP Basic Auth
    # header value to attach (X-Auth-Basic). On 200, nginx opens the upstream
    # and pipes bytes. On 401, the WebSocket is rejected.
    #
    # The upstream URI is /websockify (noVNC convention) — KasmVNC serves the
    # WebSocket there. /proxy/<token> is purely a public-side naming scheme
    # so we can keep the per-session token in the URL for auth_request. Since
    # proxy_pass uses a variable, nginx does NOT rewrite the URI automatically;
    # we set it explicitly to /websockify.
    location ~ ^/proxy/(?<token>[A-Za-z0-9_-]+)$ {
        auth_request           /internal/proxy_auth;
        auth_request_set       $upstream    $upstream_http_x_upstream;
        auth_request_set       $auth_basic  $upstream_http_x_auth_basic;

        proxy_pass             http://$upstream/websockify;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade        $http_upgrade;
        proxy_set_header       Connection     "upgrade";
        proxy_set_header       Authorization  $auth_basic;
        proxy_read_timeout     86400s;
        proxy_send_timeout     86400s;
    }

    # auth_request endpoint: not reachable from outside. nginx passes the
    # original URI as a header so Flask can extract the browser_token.
    location = /internal/proxy_auth {
        internal;
        proxy_pass            http://flask/internal/proxy_auth;
        proxy_pass_request_body off;
        proxy_set_header      Content-Length "";
        proxy_set_header      X-Original-URI $request_uri;
        proxy_set_header      Cookie $http_cookie;
    }
}
